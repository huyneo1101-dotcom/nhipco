<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d2b22" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.svg" />
<link rel="apple-touch-icon" href="./icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Nhịp Cơ" />
<title>Nhịp Cơ — bạn đồng hành khi đứng bàn bi-a</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
<style>
:root{
  --bg:#0a241c; --bg2:#0d2b22; --card:#103a2e; --card2:#0e3328;
  --line:#1d5743; --text:#eafff5; --muted:#8fc7b2; --soft:#bfe9d6;
  --gold:#f4c95d; --on-gold:#1a1206; --accent:#34d399; --accent2:#10b981;
  --warn:#fbbf24; --danger:#f87171; --ok:#34d399;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --r:18px;
}
body.theme-midnight{
  --bg:#0b1020; --bg2:#0e1530; --card:#161f3d; --card2:#131b35;
  --line:#293561; --text:#eaf0ff; --muted:#93a0cf; --soft:#c3cdf2;
  --gold:#9db4ff; --on-gold:#0b1020; --accent:#7c9bff; --accent2:#5d7cf0;
}
body.theme-coffee{
  --bg:#1b120c; --bg2:#231811; --card:#33241a; --card2:#2c2016;
  --line:#5a4230; --text:#fbeede; --muted:#c8a98a; --soft:#e7d2b8;
  --gold:#e6a44e; --on-gold:#241405; --accent:#e0995a; --accent2:#c97f3e;
}
body.theme-court{ /* light */
  --bg:#eef4f0; --bg2:#e3ede8; --card:#ffffff; --card2:#f4f8f6;
  --line:#d4e3da; --text:#11302a; --muted:#5b7a70; --soft:#23463d;
  --gold:#0f9d6b; --on-gold:#ffffff; --accent:#10b981; --accent2:#059669;
  --shadow:0 8px 24px rgba(16,60,48,.12);
}
body.theme-racing{
  --bg:#161311; --bg2:#1d1815; --card:#241d1a; --card2:#1f1815;
  --line:#3d322d; --text:#fbeeea; --muted:#c4a99f; --soft:#e6cfc6;
  --gold:#ff8a5b; --on-gold:#161311; --accent:#e2483c; --accent2:#c43a30;
}
body.theme-neon{
  --bg:#0c1408; --bg2:#111c0b; --card:#15210f; --card2:#111a0c;
  --line:#2a3d1c; --text:#eafce0; --muted:#9fc488; --soft:#c9e6b4;
  --gold:#b6ff5a; --on-gold:#0c1408; --accent:#7ddb3a; --accent2:#5fb82a;
}
body.theme-peach{ /* light */
  --bg:#fff1ea; --bg2:#ffe6db; --card:#ffffff; --card2:#fff7f3;
  --line:#f6d8c8; --text:#4a2a1c; --muted:#9c7261; --soft:#6b4434;
  --gold:#e2733e; --on-gold:#ffffff; --accent:#f08a5a; --accent2:#d96a38;
  --shadow:0 8px 24px rgba(120,60,30,.12);
}
body.theme-sage{ /* light */
  --bg:#eef6ee; --bg2:#e3efe2; --card:#ffffff; --card2:#f4f9f3;
  --line:#d8e8d6; --text:#1d3a22; --muted:#5e7d61; --soft:#2e5234;
  --gold:#4f9d52; --on-gold:#ffffff; --accent:#5fb56a; --accent2:#469a51;
  --shadow:0 8px 24px rgba(30,70,40,.12);
}
body.theme-periwinkle{ /* light */
  --bg:#eef0fc; --bg2:#e3e6f7; --card:#ffffff; --card2:#f5f6fd;
  --line:#dadff5; --text:#232a4a; --muted:#6670a0; --soft:#353e6b;
  --gold:#4f5fd6; --on-gold:#ffffff; --accent:#6b7bf0; --accent2:#4f5fd6;
  --shadow:0 8px 24px rgba(40,50,120,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  background:radial-gradient(120% 90% at 50% -10%,var(--bg2),var(--bg));
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
#root{min-height:100%;display:flex;flex-direction:column}
.app{max-width:520px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) 0 0 0}
.top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 6px}
.brand{display:flex;align-items:center;gap:10px}
.logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--gold),#d8a83b);color:var(--on-gold);
  font-weight:900;font-size:18px;box-shadow:var(--shadow)}
.brand b{font-size:18px;letter-spacing:.3px}
.brand small{display:block;color:var(--muted);font-size:11px;font-weight:600;margin-top:1px}
.iconbtn{background:var(--card);border:1px solid var(--line);color:var(--text);
  width:40px;height:40px;border-radius:12px;font-size:18px;cursor:pointer;display:grid;place-items:center}
.iconbtn:active{transform:scale(.94)}

.body{flex:1;padding:6px 16px 14px;display:flex;flex-direction:column}

.tabs{display:flex;gap:5px;padding:8px 8px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--bg) 72%,transparent);position:sticky;bottom:0;
  overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1 1 auto;min-width:60px;border:1px solid var(--line);background:var(--card2);color:var(--muted);
  border-radius:12px;padding:8px 7px;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:10px;font-weight:700;transition:.15s;white-space:nowrap}
.tab .ico{font-size:18px;line-height:1}
.tab.on{background:linear-gradient(160deg,var(--card),var(--card2));color:var(--text);
  border-color:var(--gold);box-shadow:var(--shadow)}
.tab.on .ico{filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.tab:active{transform:scale(.96)}
.resetBtn{border:none;border-radius:11px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer;
  background:linear-gradient(160deg,var(--accent),var(--accent2));color:#04231a;white-space:nowrap}
.resetBtn:active{transform:scale(.95)}
.reorder{display:flex;flex-direction:column;gap:6px}
.rrow{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--line);border-radius:11px;background:var(--card2)}
.rico{font-size:17px;width:22px;text-align:center}
.rlab{flex:1;font-weight:700;font-size:14px}
.rbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:15px;font-weight:800;cursor:pointer}
.rbtn:disabled{opacity:.3}
.musicgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.musicCard{display:flex;flex-direction:column;gap:2px;padding:14px;border:1px solid var(--line);border-radius:14px;
  background:linear-gradient(165deg,var(--card),var(--card2));text-decoration:none;color:var(--text)}
.musicCard b{font-size:15px;font-weight:800;margin-top:4px}
.musicCard small{color:var(--muted);font-size:11.5px;font-weight:600}
.musicCard:active{transform:scale(.97)}
.resetLine{font-size:20px;font-weight:800;text-align:center;max-width:88%;line-height:1.45;color:var(--soft)}
.mbar{height:7px;border-radius:99px;background:var(--line);overflow:hidden}
.mbar>div{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.musicRow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card2)}
.musicLink{flex:1;min-width:0;color:var(--text);text-decoration:none;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.xbtn{background:transparent;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:2px 6px;flex:none}
.poslegend{display:flex;gap:14px;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);margin:8px 0;flex-wrap:wrap}
.posdot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:-1px;border:1px solid rgba(0,0,0,.35)}

.card{background:linear-gradient(165deg,var(--card),var(--card2));border:1px solid var(--line);
  border-radius:var(--r);box-shadow:var(--shadow)}
.h{font-size:13px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.8px}
.muted{color:var(--muted)}
.btn{border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer;
  background:linear-gradient(160deg,var(--gold),#dca93c);color:var(--on-gold)}
.btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--line)}
.btn.acc{background:linear-gradient(160deg,var(--accent),var(--accent2));color:#04231a}
.btn:active{transform:scale(.97)}
.btn.wide{width:100%}
.chip{border:1px solid var(--line);background:var(--card2);color:var(--soft);border-radius:999px;
  padding:7px 13px;font-weight:700;font-size:13px;cursor:pointer}
.chip.on{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}

/* ----- Metronome / shared ----- */
.metro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:0}
.pendwrap{width:200px;height:200px;position:relative;flex:none}
.pend{position:absolute;bottom:16px;left:50%;margin-left:-3px;transform-origin:bottom center}
.arm{width:6px;height:150px;background:linear-gradient(var(--accent),var(--accent2));border-radius:6px}
.bob{width:32px;height:32px;border-radius:50%;background:var(--gold);position:absolute;top:-14px;left:50%;
  transform:translateX(-50%);box-shadow:0 0 22px -4px var(--gold)}
.pivot{position:absolute;bottom:10px;left:50%;width:18px;height:18px;border-radius:50%;background:var(--accent);
  transform:translateX(-50%);box-shadow:0 0 16px -2px var(--accent)}
.bpmbox{display:flex;align-items:center;gap:18px}
.bpmbox button{width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:var(--card);
  color:var(--text);font-size:26px;font-weight:800;cursor:pointer}
.bpmbox button:active{transform:scale(.92)}
.bpmnum{text-align:center;min-width:90px}
.bpmnum b{font-size:46px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums}
.bpmnum small{display:block;color:var(--muted);font-weight:700;font-size:12px;letter-spacing:1px;margin-top:2px}
.metro input[type=range]{width:100%;max-width:320px;accent-color:var(--gold)}
.clockbtns{display:flex;gap:10px;width:100%;max-width:330px}
.clockbtns .btn{flex:1}
.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.modeseg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
.modeseg button{border:none;background:transparent;color:var(--muted);font-weight:800;font-size:13px;
  padding:7px 14px;border-radius:9px;cursor:pointer}
.modeseg button.on{background:var(--gold);color:var(--on-gold)}

/* ----- Breathing ----- */
.breathe{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px}
.orb{width:min(70vw,260px);aspect-ratio:1;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%,var(--accent),var(--accent2));
  color:#04231a;box-shadow:0 0 60px -10px var(--accent);transition:transform 1s linear,background .4s}
.orb .ph{font-size:22px;font-weight:900;text-align:center}
.orb .ct{font-size:46px;font-weight:900;font-variant-numeric:tabular-nums}
.breathe .sub{color:var(--muted);text-align:center;max-width:300px;font-size:14px;line-height:1.5}

/* ----- Routine ----- */
.steps{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.step{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--line);
  border-radius:14px;background:var(--card2);cursor:pointer;transition:.15s}
.step .n{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-weight:900;
  background:var(--card);border:1px solid var(--line);color:var(--muted);flex:none;font-size:14px}
.step .tx{flex:1;font-weight:700}
.step .tx small{display:block;color:var(--muted);font-weight:600;font-size:12px;margin-top:2px}
.step.done{border-color:var(--accent);background:linear-gradient(160deg,var(--card),var(--card2))}
.step.done .n{background:var(--accent);color:#04231a;border-color:var(--accent)}
.step.done .tx{text-decoration:line-through;opacity:.65}
.step.cur{border-color:var(--gold);box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 30%,transparent)}
.step.cur .n{background:var(--gold);color:var(--on-gold);border-color:var(--gold)}
.rowbtns{display:flex;gap:10px;margin-top:14px}
.rowbtns .btn{flex:1}

/* ----- Cue cards ----- */
.cue{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}
.cuecard{width:100%;min-height:220px;padding:28px 24px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;text-align:center;cursor:pointer}
.cuecard .q{font-size:40px}
.cuecard .t{font-size:21px;font-weight:800;line-height:1.45}
.cuecard .tag{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}

/* ----- Lists / match journal + training ----- */
.list{display:flex;flex-direction:column;gap:10px;margin-top:10px;padding-bottom:6px}
.preline{white-space:pre-wrap}
.mcard{padding:13px;display:flex;flex-direction:column;gap:7px;cursor:pointer}
.mtop{display:flex;align-items:center;gap:10px}
.rbadge{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-weight:900;
  font-size:14px;flex:none}
.rbadge.W{background:var(--ok);color:#04231a} .rbadge.L{background:var(--danger);color:#3b0a0a}
.rbadge.D{background:var(--line);color:var(--text)}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag2{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--card2);
  border:1px solid var(--line);color:var(--muted)}
.statstrip{display:flex;gap:8px;margin:12px 0 4px}
.stat{flex:1;text-align:center;padding:10px 4px;border:1px solid var(--line);border-radius:12px;background:var(--card2)}
.stat b{display:block;font-size:21px;line-height:1.1} .stat small{color:var(--muted);font-size:11px;font-weight:700}
.small{font-size:12px}
.h2{font-size:13px;font-weight:800;color:var(--gold);margin:18px 0 0;letter-spacing:.3px}
.drill{padding:14px;display:flex;flex-direction:column;gap:6px}
.drow{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.drow .warn{color:var(--warn);font-size:15px}
.dt{font-weight:800;font-size:15px}
.dd{font-size:13.5px;line-height:1.5}
.drow2{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.okbadge{font-size:12px;font-weight:700;color:var(--ok)}
.btn.sm{padding:9px 14px;font-size:13px;border-radius:11px}
.lesson{padding:13px;display:flex;flex-direction:column;gap:5px}
.lesson .lz{font-size:14px;line-height:1.5;white-space:pre-wrap}
/* training — plan + library + ghost */
.tsub{color:var(--muted);font-size:13px;margin:2px 0 0;line-height:1.5}
.plan{margin-top:8px;padding:4px 4px}
.planrow{display:flex;align-items:center;gap:11px;padding:11px 10px;border-bottom:1px solid var(--line)}
.planrow:last-child{border-bottom:none}
.planrow .pi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;
  font-size:15px;background:var(--card2);border:1px solid var(--line)}
.planrow .pt{flex:1;min-width:0}
.planrow .pt b{font-weight:800;font-size:14px}
.planrow .pt small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:1px}
.catbar{display:flex;gap:7px;overflow-x:auto;padding:9px 0 3px;scrollbar-width:none}
.catbar::-webkit-scrollbar{display:none}
.catbar .chip{flex:none}
.drillC{padding:0;overflow:hidden;margin-top:0}
.drillH{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer}
.drillH .dn{flex:1;min-width:0}
.drillH .dn b{font-weight:800;font-size:14.5px}
.drillH .dn small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:1px}
.drillH .sc{text-align:right;flex:none}
.drillH .sc b{font-size:17px;line-height:1;font-variant-numeric:tabular-nums}
.drillH .sc small{display:block;color:var(--muted);font-size:10px;font-weight:700}
.catpill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;text-transform:uppercase;
  letter-spacing:.4px;background:transparent;flex:none}
.drillB{padding:2px 14px 14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.kv{font-size:13px;line-height:1.55}
.kv b{color:var(--soft);font-weight:800}
.statline{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);font-weight:700}
.statline b{color:var(--text)}
.oav{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:17px;
  background:var(--card2);border:1px solid var(--line);color:var(--gold);flex:none;text-transform:uppercase}
.hh{display:flex;gap:14px;align-items:center;font-size:13px;font-weight:800;margin-top:2px}
.hh .w{color:var(--ok)} .hh .l{color:var(--danger)} .hh .d{color:var(--muted)}
.chartcap{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
.chartcap b{color:var(--text);font-size:13px}
/* shot clock fullscreen */
.scOverlay{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:24px;text-align:center;transition:background .3s;user-select:none}
.scClose{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;width:42px;height:42px;
  border-radius:50%;border:1px solid var(--line);background:rgba(0,0,0,.2);color:var(--text);font-size:20px;cursor:pointer}
.scStep{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.scPhase{font-size:30px;font-weight:900;line-height:1.15;max-width:90%}
.scSub{font-size:15px;color:var(--muted);font-weight:600;margin-top:-2px;max-width:88%}
.scNum{font-size:34vw;font-weight:900;line-height:.9;font-variant-numeric:tabular-nums;margin:6px 0}
.scBar{width:min(82vw,360px);height:10px;border-radius:99px;background:var(--line);overflow:hidden}
.scHint{font-size:13px;color:var(--muted);font-weight:600}
@keyframes scpulse{0%,100%{opacity:1}50%{opacity:.35}}
.scNum.pulse{animation:scpulse .5s steps(1) infinite}
.mtable{width:100%;max-width:300px;align-self:center;border-radius:7px;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.cueball{width:148px;height:148px;align-self:center;touch-action:none;cursor:pointer;margin-top:6px}
.ghostform{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px}
.dot.W{background:var(--ok)} .dot.L{background:var(--danger)}
.stepper{display:flex;align-items:center;gap:18px;justify-content:center;margin:8px 0 4px}
.stepper button{width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
  background:var(--card);color:var(--text);font-size:24px;font-weight:800;cursor:pointer}
.stepper button:active{transform:scale(.92)}
.stepper .sv{font-size:42px;font-weight:900;min-width:96px;text-align:center;font-variant-numeric:tabular-nums;line-height:1}
.stepper .sv small{display:block;font-size:12px;color:var(--muted);font-weight:700}

/* ----- Sheets / modal ----- */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;
  justify-content:center;z-index:40}
.sheet{width:100%;max-width:520px;background:var(--bg2);border:1px solid var(--line);
  border-radius:22px 22px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -10px 40px rgba(0,0,0,.4);max-height:82vh;overflow:auto}
.sheet h3{margin:2px 0 14px;font-size:17px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}

/* chống nháy theme + báo lỗi nếu thiếu thư viện */
(function(){
  try{var t=localStorage.getItem('nc.theme');if(t)document.body.className='theme-'+t;}catch(e){}
  window.addEventListener('error',function(ev){
    var d=document.getElementById('diag');
    if(d){d.style.display='block';d.textContent='Lỗi tải app:\n'+(ev.message||ev.error)+'\n\nKiểm tra mạng (CDN React/Babel) rồi mở lại.';}
  });
  setTimeout(function(){
    if(!window.React||!window.ReactDOM){
      var d=document.getElementById('diag');
      d.style.display='block';
      d.textContent='Không tải được React/Babel từ CDN.\nApp cần Internet ở lần mở đầu tiên.\nKiểm tra kết nối rồi tải lại trang.';
    }
  },4000);
})();

/* ---------- buzz ---------- */
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
let _ac=null;
function beep(freq,dur,vol){
  freq=freq||880; dur=dur||0.09; vol=vol||0.4;
  try{
    if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)();
    const c=_ac; if(c.state==='suspended') c.resume();
    const o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
    o.frequency.value=freq; o.type='sine'; o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}

/* ================= Đếm nhịp (metronome) ================= */
function Metronome(){
  const [bpm,setBpm]=useState(()=>store.get('nc.bpm',55));
  const [on,setOn]=useState(false);
  const [beat,setBeat]=useState(0);
  const [sound,setSound]=useState(()=>store.get('nc.metroSound',true));
  const acRef=useRef(null), soundRef=useRef(sound), tapRef=useRef([]), timer=useRef(null);
  useEffect(()=>{ soundRef.current=sound; store.set('nc.metroSound',sound); },[sound]);
  useEffect(()=>{ store.set('nc.bpm',bpm); },[bpm]);

  const click=()=>{
    if(!soundRef.current) return;
    try{
      if(!acRef.current) acRef.current=new (window.AudioContext||window.webkitAudioContext)();
      const c=acRef.current; if(c.state==='suspended') c.resume();
      const o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
      o.frequency.value=1000; o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.5,t+0.004);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
      o.start(t); o.stop(t+0.06);
    }catch(e){}
  };
  useEffect(()=>{
    if(!on){ clearInterval(timer.current); return; }
    const tick=()=>{ setBeat(b=>b+1); click(); buzz(25); };
    tick();
    timer.current=setInterval(tick,60000/bpm);
    return ()=>clearInterval(timer.current);
  },[on,bpm]);

  const tap=()=>{
    const t=Date.now(), a=tapRef.current;
    if(a.length && t-a[a.length-1]>2000) a.length=0;
    a.push(t); if(a.length>5) a.shift();
    if(a.length>=2){
      let s=0; for(let i=1;i<a.length;i++) s+=a[i]-a[i-1];
      const b=Math.round(60000/(s/(a.length-1)));
      setBpm(Math.max(30,Math.min(120,b)));
    }
  };
  const ang = on ? (beat%2===0? 15 : -15) : 0;
  return (
    <div className="metro">
      <div className="pendwrap">
        <div className="pend" style={{transform:`rotate(${ang}deg)`,
          transitionDuration:on?(60/bpm)+'s':'.3s',transitionTimingFunction:'ease-in-out'}}>
          <div className="bob"/><div className="arm"/>
        </div>
        <div className="pivot"/>
      </div>
      <div className="bpmbox">
        <button onClick={()=>setBpm(b=>Math.max(30,b-1))}>－</button>
        <div className="bpmnum"><b>{bpm}</b><small>BPM</small></div>
        <button onClick={()=>setBpm(b=>Math.min(120,b+1))}>＋</button>
      </div>
      <input type="range" min="30" max="120" value={bpm} onChange={e=>setBpm(+e.target.value)}/>
      <div className="presets" style={{justifyContent:'center'}}>
        {[50,55,60,72].map(p=><button key={p} className={'chip'+(bpm===p?' on':'')} onClick={()=>setBpm(p)}>{p}</button>)}
        <button className="chip" onClick={tap}>👆 Gõ nhịp</button>
      </div>
      <div className="clockbtns" style={{maxWidth:330}}>
        <button className="btn acc" onClick={()=>setOn(o=>!o)}>{on?'⏸ Dừng':'▶ Bắt đầu'}</button>
        <button className="btn ghost" onClick={()=>setSound(s=>!s)}>{sound?'🔊 Tiếng':'🔇 Tắt tiếng'}</button>
      </div>
      <div className="muted" style={{fontSize:13,textAlign:'center',maxWidth:320,lineHeight:1.5}}>
        Đưa cơ theo tiếng tách để nhịp tay đều và mượt. Chậm (50–60) cho cú chuẩn xác.
      </div>
    </div>
  );
}

/* ================= Nhịp thở (Box / 4-7-8) ================= */
function Breathe(){
  const [pk,setPk]=useState(()=>store.get('nc.breath','box'));
  const pat=BREATH.find(p=>p.key===pk)||BREATH[0];
  const phases=pat.phases;
  const [on,setOn]=useState(false);
  const [pi,setPi]=useState(0);
  const [left,setLeft]=useState(phases[0][1]);
  const [cycles,setCycles]=useState(0);
  const ref=useRef(null);

  useEffect(()=>{ store.set('nc.breath',pk); setOn(false); setPi(0); setLeft(pat.phases[0][1]); setCycles(0); },[pk]);

  useEffect(()=>{
    if(!on){ clearInterval(ref.current); return; }
    ref.current=setInterval(()=>{
      setLeft(l=>{
        if(l>1) return l-1;
        setPi(p=>{ const np=(p+1)%phases.length; if(np===0) setCycles(c=>c+1); buzz(60); return np; });
        return phases[(pi+1)%phases.length][1];
      });
    },1000);
    return ()=>clearInterval(ref.current);
  },[on,pi,pk]);

  const start=()=>{ setPi(0); setLeft(phases[0][1]); setCycles(0); setOn(true); buzz(60); };
  const stop=()=>{ setOn(false); };

  const ph=phases[pi];
  return (
    <div className="breathe">
      <div className="presets" style={{justifyContent:'center'}}>
        {BREATH.map(p=><button key={p.key} className={'chip'+(pk===p.key?' on':'')} onClick={()=>setPk(p.key)}>{p.name}</button>)}
      </div>
      <div className="orb" style={{transform:`scale(${on?ph[2]:1.1})`,transitionDuration: on?ph[1]+'s':'.6s'}}>
        <div>
          <div className="ph">{on?ph[0]:'Sẵn sàng'}</div>
          <div className="ct">{on?left:pat.phases.map(p=>p[1]).join('·')}</div>
        </div>
      </div>
      <div className="sub">
        {pat.note}<br/>
        {on? <b style={{color:'var(--gold)'}}>{cycles} vòng hoàn thành</b> : 'Làm 3–4 vòng để tay vững trước cú khó.'}
      </div>
      {on
        ? <button className="btn ghost wide" onClick={stop}>⏹ Dừng</button>
        : <button className="btn acc wide" onClick={start}>▶ Bắt đầu thở</button>}
    </div>
  );
}

      </div>
      {edit && <RoutineEdit steps={steps} save={(s)=>{setSteps(s);store.set('nc.routine',s);setEdit(false);}}
                close={()=>setEdit(false)}/>}
    </div>
  );
}
function RoutineEdit({steps,save,close}){
  const [list,setList]=useState(steps.map(s=>({...s})));
  const upd=(i,k,v)=>setList(l=>l.map((s,j)=>j===i?{...s,[k]:v}:s));
  const add=()=>setList(l=>[...l,{t:'Bước mới',s:''}]);
  const del=(i)=>setList(l=>l.filter((_,j)=>j!==i));
  return (
    <div className="scrim" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>Sửa quy trình</h3>
        {list.map((s,i)=>
          <div key={i} style={{marginBottom:12,paddingBottom:12,borderBottom:'1px solid var(--line)'}}>
            <div className="editrow">
              <input value={s.t} onChange={e=>upd(i,'t',e.target.value)} placeholder="Tên bước"/>
              <button className="x" onClick={()=>del(i)}>✕</button>
            </div>
            <div className="editrow"><input value={s.s||''} onChange={e=>upd(i,'s',e.target.value)} placeholder="Ghi chú (tuỳ chọn)"/></div>
          </div>)}
        <button className="btn ghost wide" onClick={add} style={{marginBottom:10}}>＋ Thêm bước</button>
        <div className="rowbtns">
          <button className="btn ghost" onClick={()=>{save(DEFAULT_ROUTINE);}}>↺ Mặc định</button>
          <button className="btn" onClick={()=>save(list.filter(s=>s.t.trim()))}>Lưu</button>
        </div>
      </div>
    </div>
  );
}

/* ================= Cue ================= */
function Cue(){
  const [i,setI]=useState(()=>Math.floor((Date.now()/1000)%CUES.length));
  const next=()=>setI(p=>{ let n=p; while(n===p) n=Math.floor(Math.random()*CUES.length); return n; });
  const c=CUES[i];
  return (
    <div className="cue">
      <div className="card cuecard" onClick={next}>
        <div className="tag">{c.tag}</div>
        <div className="q">“</div>
        <div className="t">{c.t}</div>
      </div>
      <button className="btn acc wide" onClick={next}>🔀 Câu nhắc khác</button>
      <div className="muted" style={{fontSize:13}}>Chạm thẻ để đổi câu</div>
    </div>
  );
}

/* ================= Settings ================= */
function Settings({theme,setTheme,order,setOrder,close}){
  const fileRef=useRef(null);
  const KEYS=['nc.theme','nc.taborder','nc.breath','nc.bpm','nc.metroSound','nc.shotTotal','nc.routine','nc.matches','nc.mistakes','nc.positions','nc.music','nc.training','nc.ghost'];
  const moveTab=(i,dir)=>{ const j=i+dir; if(j<0||j>=order.length) return; const o=order.slice(); const x=o[i]; o[i]=o[j]; o[j]=x; setOrder(o); };
  const exportData=()=>{
    const data={}; KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v!=null) data[k]=v; });
    const blob=new Blob([JSON.stringify({app:'nhipco',version:1,exportedAt:todayStr(),data},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='nhipco-backup-'+todayStr()+'.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  };
  const importData=(e)=>{
    const f=e.target.files&&e.target.files[0]; e.target.value='';
    if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const obj=JSON.parse(r.result); const data=(obj&&obj.data)?obj.data:obj;
        if(!data||typeof data!=='object') throw 0;
        const keys=Object.keys(data).filter(k=>k.indexOf('nc.')===0);
        if(!keys.length) throw 0;
        if(!window.confirm('Nhập sẽ GHI ĐÈ dữ liệu hiện tại trên máy này. Tiếp tục?')) return;
        keys.forEach(k=>localStorage.setItem(k, typeof data[k]==='string'?data[k]:JSON.stringify(data[k])));
        window.alert('Đã nhập xong. Tải lại app...'); location.reload();
      }catch(err){ window.alert('File sao lưu không hợp lệ.'); }
    };
    r.readAsText(f);
  };
  return (
    <div className="scrim" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>Cài đặt</h3>
        <div className="field">
          <label>🎨 Giao diện</label>
          <div className="swatches">
            {THEMES.map(t=>
              <div key={t.key} className={'sw'+(theme===t.key?' on':'')}
                style={{background:`linear-gradient(145deg,${t.c},${t.g})`}}
                title={t.name} onClick={()=>setTheme(t.key)}/>)}
          </div>
          <div className="muted" style={{fontSize:12,marginTop:6}}>{THEMES.find(t=>t.key===theme)?.name}</div>
        </div>
        <div className="field">
          <label>🔀 Thứ tự tab (thanh dưới)</label>
          <div className="muted" style={{fontSize:12,marginBottom:8}}>Dùng ↑ ↓ để đổi vị trí. Tab đầu danh sách sẽ mở khi vào app.</div>
          <div className="reorder">
            {order.map((id,i)=>{ const d=TAB_DEFS.find(t=>t.id===id); if(!d) return null; return (
              <div key={id} className="rrow">
                <span className="rico">{d.ico}</span>
                <span className="rlab">{d.lab}</span>
                <button className="rbtn" disabled={i===0} onClick={()=>moveTab(i,-1)} aria-label="Lên">↑</button>
                <button className="rbtn" disabled={i===order.length-1} onClick={()=>moveTab(i,1)} aria-label="Xuống">↓</button>
              </div>); })}
          </div>
        </div>
        <div className="field">
          <label>💾 Sao lưu dữ liệu</label>
          <div className="muted" style={{fontSize:12,marginBottom:8,lineHeight:1.5}}>Dữ liệu lưu trên máy này. Xuất file để giữ an toàn hoặc chuyển sang máy/điện thoại khác.</div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn ghost" style={{flex:1}} onClick={exportData}>⬇️ Xuất file</button>
            <button className="btn ghost" style={{flex:1}} onClick={()=>fileRef.current&&fileRef.current.click()}>⬆️ Nhập file</button>
          </div>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{display:'none'}} onChange={importData}/>
        </div>
        <div className="muted" style={{fontSize:12,lineHeight:1.6,marginTop:8}}>
          <b style={{color:'var(--soft)'}}>Mẹo dùng:</b><br/>
          • <b>Nhịp thở</b>: chọn Hộp hoặc 4-7-8, làm 3–4 vòng khi hồi hộp.<br/>
          • <b>Đếm nhịp</b>: bật tiếng tách, đưa cơ theo nhịp cho đều tay (Gõ nhịp để tự dò BPM).<br/>
          • <b>Routine</b>: chạm tích từng bước, sửa theo thói quen riêng.<br/>
          • <b>Nhật ký → Tập luyện</b>: ghi lỗi sau mỗi trận, app gợi ý bài tập đúng điểm yếu.
        </div>
        <button className="btn wide" onClick={close} style={{marginTop:14}}>Đóng</button>
      </div>
    </div>
  );
}

/* ================= Nhật ký trận đấu ================= */
function MatchLog(){
  const [list,setList]=useState(()=>store.get('nc.matches',[]));
  const [extra,setExtra]=useState(()=>store.get('nc.mistakes',[]));  // lỗi tự ghi (không từ trận)
  const [positions,setPositions]=useState(()=>store.get('nc.positions',[]));  // tình huống điều bi lỗi
  const [form,setForm]=useState(null);
  const [mform,setMform]=useState(false);
  const [pform,setPform]=useState(null);   // editor thế bi (null | {} | bản ghi)
  const [view2,setView2]=useState('log');
  const save=(l)=>{ setList(l); store.set('nc.matches',l); };
  const saveExtra=(l)=>{ setExtra(l); store.set('nc.mistakes',l); };
  const savePos=(l)=>{ setPositions(l); store.set('nc.positions',l); };
  const upsertPos=(p)=>{ savePos(p.id? positions.map(x=>x.id===p.id?p:x) : [{...p,id:uid('p'),date:todayStr()},...positions]); setPform(null); };
  const delPos=(id)=>savePos(positions.filter(x=>x.id!==id));
  const upsert=(recs)=>{   // recs: mảng 1–2 bản ghi
    let next=list.slice();
    recs.forEach(m=>{ if(m.id){ next=next.map(x=>x.id===m.id?m:x); } else { next=[{...m,id:uid('m')},...next]; } });
    save(next); setForm(null);
  };
  const addExtra=(rec)=>{ saveExtra([{...rec,id:uid('x'),date:todayStr()},...extra]); setMform(false); };
  const delExtra=(id)=>saveExtra(extra.filter(x=>x.id!==id));
  const del=(id)=>{ save(list.filter(x=>x.id!==id)); setForm(null); };
  const w=list.filter(m=>m.result==='W').length, l=list.filter(m=>m.result==='L').length;
  const rate=(w+l)? Math.round(w/(w+l)*100):0;
  const mc={}; list.forEach(m=>(m.mistakes||[]).forEach(x=>mc[x]=(mc[x]||0)+1));
  const top=Object.entries(mc).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const view=[...list].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.id>a.id?1:-1));
  // Danh sách đối thủ đã từng ghi — gần nhất lên trước, để lần sau chọn lại
  const oppNames=[]; view.forEach(m=>{ const n=(m.opp||'').trim(); if(n&&!oppNames.includes(n)) oppNames.push(n); });
  // Đối đầu theo từng đối thủ (view đã sắp mới→cũ nên kèo gặp đầu tiên là kèo gần nhất)
  const omap={}, lastHc={};
  view.forEach(m=>{ const n=(m.opp||'').trim(); if(!n) return;
    const hc=(m.handicap||'').trim();
    if(hc&&!lastHc[n]) lastHc[n]=hc;
    const o=omap[n]||(omap[n]={name:n,n:0,w:0,l:0,d:0,games:{},mis:{},last:'',hc:''});
    o.n++; if(m.result==='W')o.w++; else if(m.result==='L')o.l++; else o.d++;
    if(m.game)o.games[m.game]=(o.games[m.game]||0)+1;
    if(hc&&!o.hc)o.hc=hc;
    (m.mistakes||[]).forEach(x=>o.mis[x]=(o.mis[x]||0)+1);
    if((m.date||'')>o.last)o.last=m.date;
  });
  const opps=Object.values(omap).sort((a,b)=>b.n-a.n||(b.last>a.last?1:-1));

  // Tổng hợp tất cả lỗi (từ trận + lỗi tự ghi) → gom theo nhóm
  const allMis={};
  list.forEach(m=>(m.mistakes||[]).forEach(x=>allMis[x]=(allMis[x]||0)+1));
  extra.forEach(e=>(e.tags||[]).forEach(x=>allMis[x]=(allMis[x]||0)+1));
  const misTotal=Object.values(allMis).reduce((s,c)=>s+c,0);
  const misMax=Math.max(1,...Object.values(allMis));
  const catOrder=MISTAKE_CATS.map(c=>c.t).concat('Khác');
  const catAgg={};
  Object.entries(allMis).forEach(([mis,c])=>{ const k=mistakeCat(mis); (catAgg[k]=catAgg[k]||{total:0,items:[]}); catAgg[k].total+=c; catAgg[k].items.push([mis,c]); });
  const catList=catOrder.filter(k=>catAgg[k]).map(k=>({cat:k,total:catAgg[k].total,items:catAgg[k].items.sort((a,b)=>b[1]-a[1])})).sort((a,b)=>b.total-a.total);

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div className="h">Nhật ký trận đấu</div>
        <button className="chip on" onClick={()=>setForm({date:todayStr(),result:'W',game:'10-bi',mistakes:[],feel:3})}>＋ Ghi trận</button>
      </div>

      <div className="modeseg" style={{alignSelf:'stretch',margin:'10px 0 2px',overflowX:'auto'}}>
        <button className={view2==='log'?'on':''} onClick={()=>setView2('log')}>Lịch sử</button>
        <button className={view2==='opps'?'on':''} onClick={()=>setView2('opps')}>Đối thủ</button>
        <button className={view2==='mis'?'on':''} onClick={()=>setView2('mis')}>Lỗi</button>
        <button className={view2==='pos'?'on':''} onClick={()=>setView2('pos')}>Điều bi</button>
      </div>

      {view2==='log' && list.length===0 &&
        <Empty ico="📓" t="Chưa ghi trận nào"
          s="Ghi lại kết quả, đối thủ và lỗi mắc phải sau mỗi trận — app tự tổng kết tỉ lệ thắng và lỗi bạn hay lặp."/>}

      {view2==='log' && list.length>0 && <>
        <div className="statstrip">
          <div className="stat"><b>{list.length}</b><small>trận</small></div>
          <div className="stat"><b style={{color:'var(--ok)'}}>{w}</b><small>thắng</small></div>
          <div className="stat"><b style={{color:'var(--danger)'}}>{l}</b><small>thua</small></div>
          <div className="stat"><b style={{color:'var(--gold)'}}>{rate}%</b><small>tỉ lệ</small></div>
        </div>
        {top.length>0 &&
          <div className="card" style={{padding:'12px 14px',marginTop:8}}>
            <div className="h" style={{marginBottom:8}}>⚠️ Lỗi hay mắc nhất</div>
            <div className="tags">
              {top.map(([m,c])=><span key={m} className="tag2" style={{color:'var(--warn)',borderColor:'var(--warn)'}}>{m} · {c}×</span>)}
            </div>
          </div>}
        <div className="list">
          {view.map(m=>{
            const feel=FEELS.find(f=>f.v===m.feel);
            return (
            <div key={m.id} className="card mcard" onClick={()=>setForm(m)}>
              <div className="mtop">
                <div className={'rbadge '+m.result}>{m.result==='W'?'T':m.result==='L'?'B':'H'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:800}}>{m.opp||'Không rõ đối thủ'}{m.score&&<span className="muted" style={{fontWeight:700}}> · {m.score}</span>}</div>
                  <div className="muted" style={{fontSize:12,fontWeight:600}}>{fmtDate(m.date)} · {m.game}{m.handicap? ' · '+m.handicap:''}</div>
                </div>
                {feel&&<div style={{fontSize:22}}>{feel.e}</div>}
              </div>
              {(m.mistakes||[]).length>0 &&
                <div className="tags">{m.mistakes.map(x=><span key={x} className="tag2">{x}</span>)}</div>}
              {m.note&&<div className="muted preline" style={{fontSize:13}}>“{m.note}”</div>}
            </div>);
          })}
        </div>
      </>}

      {view2==='opps' && <>
        {opps.length===0
          ? <Empty ico="🧑‍🤝‍🧑" t="Chưa có đối thủ nào" s="Ghi tên đối thủ trong mỗi trận để xem thành tích đối đầu với từng người."/>
          : <div className="list">
              {opps.map(o=>{
                const r=(o.w+o.l)? Math.round(o.w/(o.w+o.l)*100):0;
                const gms=Object.entries(o.games).sort((a,b)=>b[1]-a[1]).map(g=>g[0]);
                const tm=Object.entries(o.mis).sort((a,b)=>b[1]-a[1]).slice(0,3);
                return (
                <div key={o.name} className="card mcard" style={{cursor:'default'}}>
                  <div className="mtop">
                    <div className="oav">{o.name.slice(0,1)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800}}>{o.name}</div>
                      <div className="muted" style={{fontSize:12,fontWeight:600}}>{o.n} trận · gần nhất {fmtDate(o.last)}{gms.length? ' · '+gms.slice(0,2).join('/'):''}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <b style={{fontSize:20,color:'var(--gold)',display:'block',lineHeight:1}}>{r}%</b>
                      <small className="muted" style={{fontSize:10,fontWeight:700}}>bạn thắng</small>
                    </div>
                  </div>
                  <div className="hh">
                    <span className="w">{o.w} thắng</span><span className="l">{o.l} thua</span>{o.d>0&&<span className="d">{o.d} hòa</span>}
                  </div>
                  {o.hc &&
                    <div className="muted" style={{fontSize:12.5,fontWeight:600}}>🎯 Kèo gần nhất: <b style={{color:'var(--gold)'}}>{o.hc}</b></div>}
                  {tm.length>0 &&
                    <div className="tags">{tm.map(([x,c])=><span key={x} className="tag2">{x} · {c}×</span>)}</div>}
                </div>);
              })}
            </div>}
      </>}

      {view2==='mis' && <>
        <button className="btn acc wide" style={{margin:'8px 0 4px'}} onClick={()=>setMform(true)}>＋ Ghi lỗi nhớ ra (không cần trận)</button>
        <div className="tsub">Tự tổng hợp mọi lỗi (từ trận đấu + lỗi bạn tự ghi), gom thành nhóm để biết cần sửa gì nhất.</div>
        {misTotal===0
          ? <Empty ico="🧠" t="Chưa có lỗi nào" s="Ghi lỗi trong trận đấu, hoặc bấm nút trên để ghi nhanh lỗi bạn nhớ ra."/>
          : <>
            <div className="statstrip">
              <div className="stat"><b>{misTotal}</b><small>lượt lỗi</small></div>
              <div className="stat"><b style={{color:'var(--gold)'}}>{catList.length}</b><small>nhóm lỗi</small></div>
              <div className="stat"><b style={{fontSize:14,marginTop:5,display:'block'}}>{catList[0]?catList[0].cat:'—'}</b><small>cần sửa nhất</small></div>
            </div>
            <div className="list">
              {catList.map(c=>(
                <div key={c.cat} className="card" style={{padding:'12px 14px'}}>
                  <div className="drow" style={{marginBottom:8}}><b style={{fontSize:15}}>{c.cat}</b><span className="muted small">{c.total} lượt</span></div>
                  {c.items.map(([mis,n])=>(
                    <div key={mis} style={{margin:'7px 0'}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,marginBottom:3}}><span>{mis}</span><span className="muted">{n}×</span></div>
                      <div className="mbar"><div style={{width:Math.round(n/misMax*100)+'%'}}/></div>
                    </div>))}
                </div>))}
            </div>
            {extra.length>0 && <>
              <div className="h2">📝 Lỗi tự ghi gần đây</div>
              <div className="list">
                {extra.slice(0,12).map(e=>(
                  <div key={e.id} className="card" style={{padding:'11px 13px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                      <div style={{flex:1}}>
                        <div className="tags">{(e.tags||[]).map(x=><span key={x} className="tag2">{x}</span>)}</div>
                        {e.note&&<div className="muted preline" style={{fontSize:13,marginTop:5}}>“{e.note}”</div>}
                        <div className="muted small" style={{marginTop:4}}>{fmtDate(e.date)}</div>
                      </div>
                      <button className="x" onClick={()=>delExtra(e.id)} style={{background:'transparent',border:'none',color:'var(--danger)',fontSize:18,cursor:'pointer'}}>✕</button>
                    </div>
                  </div>))}
              </div>
            </>}
          </>}
      </>}

      {view2==='pos' && <>
        <button className="btn acc wide" style={{margin:'8px 0 4px'}} onClick={()=>setPform({})}>＋ Thêm tình huống điều bi</button>
        <div className="tsub">Dựng lại thế bi bạn điều lỗi: kéo bi cái, bi mục tiêu và bi tiếp theo lên bàn rồi ghi chú.</div>
        <div className="poslegend">
          <span><i className="posdot" style={{background:'#f3f1e8'}}/>Bi cái</span>
          <span><i className="posdot" style={{background:'#e0556b'}}/>Bi mục tiêu</span>
          <span><i className="posdot" style={{background:'#f4c95d'}}/>Bi tiếp theo</span>
        </div>
        {positions.length===0
          ? <Empty ico="🎱" t="Chưa có tình huống nào" s="Bấm nút trên để dựng lại thế bi bạn điều lỗi và rút kinh nghiệm."/>
          : <div className="list">
              {positions.map(p=>(
                <div key={p.id} className="card" style={{padding:12}}>
                  <MiniTable dia={{balls:[{x:p.cue.x,y:p.cue.y,cue:true},{x:p.obj.x,y:p.obj.y,num:9,stripe:'#e8c020'},{x:p.nxt.x,y:p.nxt.y,num:10,stripe:'#2f6fd6'}]}}/>
                  {p.note&&<div className="muted preline" style={{fontSize:13,marginTop:8}}>“{p.note}”</div>}
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                    <span className="muted small">{fmtDate(p.date)}{p.tip?' · đầu cơ: '+tipLabel(p.tip):''}</span>
                    <div style={{display:'flex',gap:8}}>
                      <button className="chip" onClick={()=>setPform(p)}>✎ Sửa</button>
                      <button className="xbtn" onClick={()=>delPos(p.id)}>✕</button>
                    </div>
                  </div>
                </div>))}
            </div>}
      </>}

      {form && <MatchForm init={form} names={oppNames} lastHc={lastHc} onSave={upsert} onDel={del} close={()=>setForm(null)}/>}

    </div>
  );
}

function PositionEditor({init,onSave,onDel,close}){
  const [cue,setCue]=useState(init?init.cue:{x:24,y:36});
  const [obj,setObj]=useState(init?init.obj:{x:54,y:22});
  const [nxt,setNxt]=useState(init?init.nxt:{x:80,y:38});
  const [tip,setTip]=useState(init&&init.tip?init.tip:{x:0,y:0});
  const [note,setNote]=useState(init?(init.note||''):'');
  const drag=useRef(null), svgRef=useRef(null), tipRef=useRef(null), tdrag=useRef(false);
  const toSvg=(e)=>{ const r=svgRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:Math.round(Math.max(FELT[0],Math.min(FELT[1],(cx-r.left)/r.width*100))),
            y:Math.round(Math.max(FELT[2],Math.min(FELT[3],(cy-r.top)/r.height*54)))}; };
  const setter={cue:setCue,obj:setObj,nxt:setNxt};
  const pos={cue,obj,nxt};
  const place=(k,p)=>setter[k](p);
  const down=(e)=>{ const p=toSvg(e); let best='cue',bd=1e9; ['cue','obj','nxt'].forEach(k=>{const d=Math.hypot(p.x-pos[k].x,p.y-pos[k].y); if(d<bd){bd=d;best=k;}}); drag.current=best; place(best,p); };
  const move=(e)=>{ if(!drag.current) return; e.preventDefault(); place(drag.current,toSvg(e)); };
  const up=()=>{ drag.current=null; };
  // chọn đầu cơ trên mặt bi cái
  const tipAt=(e)=>{ const r=tipRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    let x=(cx-r.left)/r.width*2-1, y=(cy-r.top)/r.height*2-1; const m=Math.hypot(x,y); if(m>1){x/=m;y/=m;}
    setTip({x:Math.round(x*100)/100,y:Math.round(y*100)/100}); };
  const tdown=(e)=>{ tdrag.current=true; e.preventDefault(); tipAt(e); };
  const tmove=(e)=>{ if(!tdrag.current) return; e.preventDefault(); tipAt(e); };
  const tup=()=>{ tdrag.current=false; };
  return (
    <div className="scrim" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <h3>{init?'Sửa tình huống':'Dựng thế bi'}</h3>
        <div className="muted small" style={{margin:'-8px 0 8px'}}>Kéo từng bi vào đúng vị trí trên bàn.</div>
        <svg ref={svgRef} className="mtable" viewBox="0 0 100 54" preserveAspectRatio="xMidYMid meet"
          style={{width:'100%',maxWidth:'none',touchAction:'none'}}
          onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
          onTouchStart={down} onTouchMove={move} onTouchEnd={up}>
          <TableFrame/>
          <Ball x={cue.x} y={cue.y} b={{cue:true}}/>
          <Ball x={obj.x} y={obj.y} b={{num:9,stripe:'#e8c020'}}/>
          <Ball x={nxt.x} y={nxt.y} b={{num:10,stripe:'#2f6fd6'}}/>
        </svg>
        <div className="poslegend">
          <span><i className="posdot" style={{background:'#f4f1e6'}}/>Bi cái</span>
          <span><i className="posdot" style={{background:'#e8c020'}}/>Bi 9 (mục tiêu)</span>
          <span><i className="posdot" style={{background:'#2f6fd6'}}/>Bi 10 (kế)</span>
        </div>

        <div className="field" style={{alignItems:'center',marginTop:6}}>
          <label style={{alignSelf:'flex-start'}}>Đầu cơ bạn đã đánh (chạm điểm trên bi cái)</label>
          <svg ref={tipRef} className="cueball" viewBox="0 0 100 100"
            onMouseDown={tdown} onMouseMove={tmove} onMouseUp={tup} onMouseLeave={tup}
            onTouchStart={tdown} onTouchMove={tmove} onTouchEnd={tup}>
            <circle cx="50" cy="50" r="46" fill="#f4f1e6" stroke="var(--line)" strokeWidth="2"/>
            <line x1="50" y1="8" x2="50" y2="92" stroke="#000" strokeOpacity=".12" strokeWidth="1"/>
            <line x1="8" y1="50" x2="92" y2="50" stroke="#000" strokeOpacity=".12" strokeWidth="1"/>
            <circle cx={50+tip.x*40} cy={50+tip.y*40} r="9" fill="var(--accent)" stroke="#04231a" strokeWidth="1.5"/>
          </svg>
          <div className="muted small" style={{marginTop:4}}>Điểm chạm: <b style={{color:'var(--gold)'}}>{tipLabel(tip)}</b></div>
        </div>

        <div className="field"><label>Ghi chú (điều bi sai chỗ nào, nên đánh thế nào)</label>
          <textarea rows="3" value={note} onChange={e=>setNote(e.target.value)} placeholder="VD: định ra giữa bàn nhưng bi cái đi quá, kẹt sau bi 10..."/></div>
        <div className="rowbtns">
          {onDel && <button className="btn ghost" onClick={onDel} style={{color:'var(--danger)',flex:'0 0 auto'}}>🗑 Xoá</button>}
          <button className="btn" onClick={()=>onSave({...(init||{}),cue,obj,nxt,tip,note:note.trim()})}>Lưu</button>
        </div>
      </div>
    </div>
  );
}

        <div className="field"><label>Thể loại</label>

/* ================= Tập luyện ================= */
const POCKETS=[[7,8],[50,5.4],[93,8],[7,46],[50,48.6],[93,46]];
const FELT=[10,90,10,44]; // giới hạn di chuyển bi: x0,x1,y0,y1
function TableFrame(){
  return (
    <g>
      <rect x="0" y="0" width="100" height="54" rx="5" fill="#6b4a2a"/>
      <rect x="3.5" y="4.5" width="93" height="45" rx="3" fill="#0c5e3c"/>
      {POCKETS.map((p,i)=>(<g key={i}><circle cx={p[0]} cy={p[1]} r="4.3" fill="#3a2a18"/><circle cx={p[0]} cy={p[1]} r="3" fill="#05140d"/></g>))}
    </g>
  );
}
function bandPath(cx,cy,r,b){
  const w=Math.sqrt(Math.max(0,r*r-b*b));
  return `M ${cx-w} ${cy-b} L ${cx+w} ${cy-b} A ${r} ${r} 0 0 1 ${cx+w} ${cy+b} L ${cx-w} ${cy+b} A ${r} ${r} 0 0 1 ${cx-w} ${cy-b} Z`;
}
function Ball({x,y,r,b}){
  r=r||3.6;
  if(b.cue) return <circle cx={x} cy={y} r={r} fill="#f4f1e6" stroke="rgba(0,0,0,.4)" strokeWidth=".5"/>;
  if(b.num!=null) return (
    <g>
      <circle cx={x} cy={y} r={r} fill="#f7f4ea" stroke="rgba(0,0,0,.4)" strokeWidth=".5"/>
      <path d={bandPath(x,y,r,r*0.66)} fill={b.stripe}/>
      <circle cx={x} cy={y} r={r*0.5} fill="#fff"/>
      <text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={r*0.72} fontWeight="800" fill="#222">{b.num}</text>
    </g>
  );
  return <circle cx={x} cy={y} r={r} fill={b.c} stroke="rgba(0,0,0,.35)" strokeWidth=".5"/>;
}
function tipLabel(t){
  if(!t) return 'tâm';
  if(Math.hypot(t.x,t.y)<0.28) return 'tâm';
  const v=t.y<-0.28?'cao':(t.y>0.28?'thấp':''), h=t.x<-0.28?'trái':(t.x>0.28?'phải':'');
  return [v,h].filter(Boolean).join(' ')||'tâm';
}
function MiniTable({dia}){

      <defs>

      {dia.stick && <line x1={dia.stick[0]} y1={dia.stick[1]} x2={dia.stick[2]} y2={dia.stick[3]}
        stroke="#caa05a" strokeWidth="2.6" strokeLinecap="round"/>}
      {dia.line && <line x1={dia.line[0]} y1={dia.line[1]} x2={dia.line[2]} y2={dia.line[3]}
        stroke="#ffffff" strokeOpacity=".5" strokeWidth=".7" strokeDasharray="2 2"/>}
      {(dia.arrows||[]).map((a,i)=><line key={'a'+i} x1={a[0]} y1={a[1]} x2={a[2]} y2={a[3]}
        stroke="#ffd166" strokeWidth="1.1" strokeOpacity=".95" markerEnd="url(#ncAh)"/>)}
      {dia.zone && <circle cx={dia.zone[0]} cy={dia.zone[1]} r={dia.zone[2]} fill="none"
        stroke="#ffd166" strokeWidth=".8" strokeDasharray="2.2 1.6"/>}

function Spark({vals}){
  if(!vals||vals.length<2) return null;
  const w=72,h=22;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${(h-2)-(v/100)*(h-4)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}>
      <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="1.8"
        strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}
function LineChart({vals,color='var(--accent)'}){
  if(!vals||vals.length<2) return <div className="muted small" style={{padding:'6px 0'}}>Cần ≥2 mốc dữ liệu để vẽ.</div>;
  const W=300,H=104,pad=8;
  const x=(i)=> pad + i/(vals.length-1)*(W-2*pad);
  const y=(v)=> (H-pad) - (v/100)*(H-2*pad);
  const pts=vals.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const lastI=vals.length-1;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}} preserveAspectRatio="none">
      {[0,50,100].map(g=><line key={g} x1={pad} y1={y(g)} x2={W-pad} y2={y(g)}
        stroke="var(--line)" strokeWidth="1" strokeDasharray="3 4"/>)}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.6"
        strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
      <circle cx={x(lastI)} cy={y(vals[lastI])} r="3.5" fill={color}/>
    </svg>
  );
}

function Training(){
  const matches=store.get('nc.matches',[]);
  const [recs,setRecs]=useState(()=>store.get('nc.training',[]));     // {id,date,drill,score,max,note}
  const [ghost,setGhost]=useState(()=>store.get('nc.ghost',[]));      // {id,date,game,won}
  const [scoring,setScoring]=useState(null);
  const [cat,setCat]=useState('all');

  const addScore=(r)=>{ const l=[{...r,id:uid('t'),date:todayStr()},...recs]; setRecs(l); store.set('nc.training',l); setScoring(null); };
  const addGhost=(won)=>{ const l=[{id:uid('g'),date:todayStr(),won},...ghost]; setGhost(l); store.set('nc.ghost',l); };
  const recsFor=(k)=>recs.filter(r=>r.drill===k&&typeof r.score==='number');
  const doneToday=(k)=>recs.some(r=>r.drill===k&&r.date===todayStr());

  const scored=recs.filter(r=>typeof r.score==='number');
  const mc={}; matches.forEach(m=>(m.mistakes||[]).forEach(x=>mc[x]=(mc[x]||0)+1));
  store.get('nc.mistakes',[]).forEach(e=>(e.tags||[]).forEach(x=>mc[x]=(mc[x]||0)+1));
  const weak=Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  const lessons=matches.filter(m=>m.note&&m.note.trim());

  // Điểm phong độ = trung bình % của 12 lượt chấm gần nhất
  const recent=scored.slice(0,12);
  const skill=recent.length? Math.round(recent.reduce((s,r)=>s+r.score/r.max,0)/recent.length*100):null;

  // Chuỗi ngày luyện liên tiếp (tính cả ghi điểm lẫn đấu ghost)
  const days=new Set([...recs.map(r=>r.date),...ghost.map(g=>g.date)]);
  const dk=(dt)=>dt.toISOString().slice(0,10);
  let streak=0, probe=new Date(dk(new Date()));
  if(!days.has(dk(probe))) probe.setDate(probe.getDate()-1);
  while(days.has(dk(probe))){ streak++; probe.setDate(probe.getDate()-1); }

  // Kế hoạch buổi tập hôm nay: khởi động + 2 bài theo điểm yếu + ghost
  const focusD=[];
  for(const [mis] of weak){
    const d=DRILLS.find(x=>x.fixes.includes(mis)&&x.key!=='stop'&&!focusD.includes(x));
    if(d) focusD.push(d);
    if(focusD.length>=2) break;
  }
  for(const k of ['longpot','position3','cuecircle']){ if(focusD.length>=2) break; const d=drillByKey(k); if(d&&!focusD.includes(d)) focusD.push(d); }
  const plan=[{d:drillByKey('stop'),role:'Khởi động — chuẩn nhịp cơ'},
    ...focusD.map((d,i)=>({d,role:(weak.length? 'Sửa điểm yếu':'Bài cốt lõi')+' '+(i+1)}))];

  const lib=cat==='all'? DRILLS : DRILLS.filter(d=>d.cat===cat);
  const g20=ghost.slice(0,20), gw=g20.filter(x=>x.won).length;
  const grate=g20.length? Math.round(gw/g20.length*100):null;

  // Biểu đồ tiến bộ: điểm từng lượt chấm + tỉ lệ thắng tích lũy theo trận
  const perfVals=[...scored].reverse().map(r=>Math.round(r.score/r.max*100));
  const mSorted=[...matches].sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.id>b.id?1:-1));
  let cw=0,cl=0; const winVals=[];
  mSorted.forEach(m=>{ if(m.result==='W')cw++; else if(m.result==='L')cl++; if(cw+cl>0) winVals.push(Math.round(cw/(cw+cl)*100)); });

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1}}>
      <div className="h">Tập luyện</div>
      <div className="tsub">Luyện có mục tiêu, chấm điểm và theo dõi tiến bộ — không chỉ "đánh cho vui".</div>

      {scored.length>0 &&
        <div className="statstrip">
          <div className="stat"><b style={{color:'var(--gold)'}}>{skill}</b><small>điểm phong độ /100</small></div>
          <div className="stat"><b>{streak}</b><small>ngày liên tiếp</small></div>
          <div className="stat"><b>{scored.length}</b><small>lượt đã chấm</small></div>
        </div>}

      {(perfVals.length>=2 || winVals.length>=2) && <>
        <div className="h2">📈 Tiến bộ</div>
        {perfVals.length>=2 &&
          <div className="card" style={{padding:'12px 14px',marginTop:8}}>
            <div className="chartcap"><span><b>Điểm phong độ</b> theo lượt chấm</span><span>hiện <b>{perfVals[perfVals.length-1]}</b>/100</span></div>
            <LineChart vals={perfVals}/>
          </div>}
        {winVals.length>=2 &&
          <div className="card" style={{padding:'12px 14px',marginTop:8}}>
            <div className="chartcap"><span><b>Tỉ lệ thắng</b> tích lũy</span><span>hiện <b>{winVals[winVals.length-1]}%</b></span></div>
            <LineChart vals={winVals} color="var(--gold)"/>
          </div>}
      </>}

      <div className="h2">🗓️ Buổi tập hôm nay</div>
      <div className="card plan">
        {plan.map(({d,role},i)=>(
          <div key={i} className="planrow">
            <div className="pi">{doneToday(d.key)?'✅':i+1}</div>
            <div className="pt"><b>{d.name}</b><small>{role} · mục tiêu {d.target}</small></div>
            <button className="btn acc sm" onClick={()=>setScoring(d)}>{doneToday(d.key)?'Ghi lại':'Ghi điểm'}</button>
          </div>
        ))}
        <div className="planrow">
          <div className="pi">👻</div>
          <div className="pt"><b>Đấu với Ghost</b><small>Kết thúc bằng 1 ván benchmark với chính mình</small></div>
          <div style={{display:'flex',gap:6}}>
            <button className="btn acc sm" onClick={()=>addGhost(true)}>Thắng</button>
            <button className="btn ghost sm" onClick={()=>addGhost(false)}>Thua</button>
          </div>
        </div>
      </div>

      {weak.length>0 && <>
        <div className="h2">🎯 Điểm yếu cần sửa (từ Nhật ký)</div>
        <div className="list">
          {weak.map(([mis,c])=>{
            const d=DRILLS.find(x=>x.fixes.includes(mis));
            const rs=d? recsFor(d.key):[];
            const vals=rs.slice(0,8).reverse().map(r=>Math.round(r.score/r.max*100));
            return (
            <div key={mis} className="card drill">
              <div className="drow"><b className="warn">{mis}</b><span className="muted small">mắc {c} lần</span></div>
              {d && <>
                <div className="dt">{d.name}</div>
                <div className="drow2">
                  {rs[0] && <span className="okbadge">gần nhất {rs[0].score}/{d.max}</span>}
                  {vals.length>=2 && <Spark vals={vals}/>}
                  <button className="btn acc sm" style={{marginLeft:'auto'}} onClick={()=>setScoring(d)}>Tập &amp; ghi điểm</button>
                </div>
              </>}
            </div>);
          })}
        </div>
      </>}

      <div className="h2">📚 Thư viện bài tập</div>
      <div className="catbar">
        <button className={'chip'+(cat==='all'?' on':'')} onClick={()=>setCat('all')}>Tất cả</button>
        {Object.entries(DRILL_CATS).map(([k,v])=>
          <button key={k} className={'chip'+(cat===k?' on':'')} onClick={()=>setCat(k)}>{v.t}</button>)}
      </div>
      <div className="list">
        {lib.map(d=><DrillCard key={d.key} d={d} recs={recsFor(d.key)} onScore={setScoring}/>)}
      </div>

      <div className="h2">🧩 Thế khó thường gặp</div>
      <div className="tsub" style={{marginTop:2}}>Tình huống thực tế + cách xử lý. Chạm để mở.</div>
      <div className="list">
        {PROBLEMS.map(p=><ProblemCard key={p.key} p={p}/>)}
      </div>

      <div className="h2">👻 Đấu với Ghost</div>
      <div className="card" style={{padding:'13px 14px',marginTop:8}}>
        <div className="tsub" style={{marginTop:0}}>"Ghost" là đối thủ ảo hoàn hảo: bạn phá rồi phải dọn sạch một lượt; trượt là thua. Mốc tự đánh giá kinh điển.</div>
        {g20.length>0
          ? <div style={{margin:'10px 0 2px'}}>
              <span style={{fontSize:22,fontWeight:900,color:'var(--gold)'}}>{grate}%</span>
              <span className="muted small"> thắng ({gw}/{g20.length} gần đây)</span>
              <div style={{marginTop:8}}>{g20.slice(0,14).map((x,i)=><span key={i} className={'dot '+(x.won?'W':'L')}/>)}</div>
            </div>
          : <div className="muted small" style={{margin:'8px 0'}}>Chưa có ván nào. Đấu một ván rồi ghi lại bên dưới.</div>}
        <div className="ghostform">
          <button className="btn acc sm" onClick={()=>addGhost(true)}>👍 Thắng Ghost</button>
          <button className="btn ghost sm" onClick={()=>addGhost(false)}>👎 Thua Ghost</button>
        </div>
      </div>

      {lessons.length>0 && <>
        <div className="h2">📝 Bài học bạn tự ghi</div>
        <div className="list">
          {lessons.map(m=>(
            <div key={m.id} className="card lesson">
              <div className="muted small">{fmtDate(m.date)} · {m.opp||'?'} · {m.result==='W'?'Thắng':m.result==='L'?'Thua':'Hòa'}</div>
              <div className="lz">“{m.note}”</div>
            </div>))}
        </div>
      </>}

      <div style={{height:8}}/>
      {scoring && <ScoreModal d={scoring} onSave={addScore} close={()=>setScoring(null)}/>}
    </div>
  );
}

function ShotClock(){

      </div>

          <div key={i} className="planrow">

          </div>
        ))}
      </div>
      <button className="btn acc wide" onClick={()=>setRun(true)}>▶ Vào chế độ thi đấu (toàn màn hình)</button>
      {run && <ShotClockRun total={total} close={()=>setRun(false)}/>}
    </div>
  );
}
function ShotClockRun({total,close}){
  const ph=shotPhases(total);
  const bounds=[]; let acc=0; ph.forEach(p=>{ bounds.push(acc+p.dur); acc+=p.dur; });
  const [elapsed,setElapsed]=useState(0);
  const [paused,setPaused]=useState(false);
  const ref=useRef(null), lastPhase=useRef(-1), fired=useRef(false);

  useEffect(()=>{ try{ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); }catch(e){}
    beep(600,0.08,0.4);
    return ()=>{ try{ if(document.fullscreenElement&&document.exitFullscreen) document.exitFullscreen().catch(()=>{}); }catch(e){} };
  },[]);
  useEffect(()=>{
    if(paused){ clearInterval(ref.current); return; }
    ref.current=setInterval(()=>setElapsed(e=>Math.round((e+0.1)*10)/10),100);
    return ()=>clearInterval(ref.current);
  },[paused]);

  const done=elapsed>=total;
  const remaining=Math.max(0,total-elapsed);
  let curIdx=bounds.findIndex(b=>elapsed<b-1e-9); if(curIdx<0) curIdx=ph.length-1;
  useEffect(()=>{
    if(done){ if(!fired.current){ fired.current=true; buzz([300,80,300,80,500]); beep(440,0.2,0.5); setPaused(true);} return; }
    if(curIdx!==lastPhase.current){
      if(lastPhase.current>=0){ buzz(150); beep(curIdx===ph.length-1?780:560,0.11,0.45); }
      lastPhase.current=curIdx;
    }
  });
  const cur=ph[Math.min(curIdx,ph.length-1)];
  const danger=remaining<=5 && !done;
  const reset=()=>{ setElapsed(0); setPaused(false); fired.current=false; lastPhase.current=-1; beep(600,0.08,0.4); };

  return (
    <div className="scOverlay" style={{background:done?'#7a1414':'var(--bg)'}} onClick={()=>!done&&setPaused(p=>!p)}>
      <button className="scClose" onClick={(e)=>{e.stopPropagation();close();}} aria-label="Thoát">✕</button>
      {!done ? <>
        <div className="scStep">Bước {curIdx+1}/{ph.length}</div>
        <div className="scPhase" style={{color:cur.c}}>{cur.name}</div>
        <div className="scSub">{cur.sub}</div>
        <div className={'scNum'+(danger?' pulse':'')} style={{color:danger?'var(--danger)':'var(--text)'}}>{Math.ceil(remaining)}</div>
        <div className="scBar"><div style={{height:'100%',borderRadius:99,width:(remaining/total*100)+'%',background:cur.c,transition:'width .1s linear'}}/></div>
        <div className="scHint">{paused?'⏸ Tạm dừng — chạm để tiếp tục':'chạm bất kỳ đâu để tạm dừng'}</div>
      </> : <>
        <div className="scPhase" style={{color:'#fff'}}>HẾT GIỜ — BẮN!</div>
        <div className="scNum" style={{color:'#fff'}}>0</div>
        <button className="btn wide" style={{maxWidth:240,marginTop:10}} onClick={(e)=>{e.stopPropagation();reset();}}>↻ Lặp lại</button>
      </>}
    </div>
  );
}
function reflect(A,B,RX,POCK){
  const x0=RX[0],x1=RX[1],y0=RX[2],y1=RX[3];
  let p={x:A.x,y:A.y}; let dx=B.x-A.x, dy=B.y-A.y; const L=Math.hypot(dx,dy)||1; dx/=L; dy/=L;
  const pts=[{x:p.x,y:p.y}]; let bounces=0, made=false, budget=520;
  for(let it=0; it<14 && budget>0.1; it++){
    let tx=Infinity, ty=Infinity;
    if(dx>1e-6) tx=(x1-p.x)/dx; else if(dx<-1e-6) tx=(x0-p.x)/dx;
    if(dy>1e-6) ty=(y1-p.y)/dy; else if(dy<-1e-6) ty=(y0-p.y)/dy;
    let t=Math.min(tx,ty); if(!isFinite(t)||t<=1e-6) break; t=Math.min(t,budget);
    const np={x:p.x+dx*t,y:p.y+dy*t};
    let hit=null, hitU=Infinity;
    POCK.forEach(q=>{
      const sx=np.x-p.x, sy=np.y-p.y, s2=sx*sx+sy*sy||1;
      let u=((q[0]-p.x)*sx+(q[1]-p.y)*sy)/s2; u=Math.max(0,Math.min(1,u));
      const cxp=p.x+sx*u, cyp=p.y+sy*u; const dist=Math.hypot(q[0]-cxp,q[1]-cyp);
      if(dist<4 && u<hitU){ hit={x:cxp,y:cyp}; hitU=u; }
    });
    if(hit){ pts.push(hit); made=true; break; }
    pts.push(np); budget-=t; p=np;
    if(t===tx) { dx=-dx; bounces++; }
    if(t===ty) { dy=-dy; bounces++; }
  }
  return {pts,made,bounces};
}
function AngleCalc(){
  const [A,setA]=useState({x:24,y:38});
  const [B,setB]=useState({x:62,y:18});
  const drag=useRef(null), svgRef=useRef(null);
  const toSvg=(e)=>{
    const r=svgRef.current.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:Math.max(FELT[0],Math.min(FELT[1],(cx-r.left)/r.width*100)),
            y:Math.max(FELT[2],Math.min(FELT[3],(cy-r.top)/r.height*54))};
  };
  const down=(e)=>{ const p=toSvg(e);
    drag.current = Math.hypot(p.x-A.x,p.y-A.y)<Math.hypot(p.x-B.x,p.y-B.y)?'A':'B';
    if(drag.current==='A') setA(p); else setB(p); };
  const move=(e)=>{ if(!drag.current) return; e.preventDefault(); const p=toSvg(e); if(drag.current==='A') setA(p); else setB(p); };
  const up=()=>{ drag.current=null; };
  const path=reflect(A,B,FELT,POCKETS);
  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,padding:'2px 0'}}>
      <div className="tsub" style={{textAlign:'center'}}>Kéo <b style={{color:'var(--text)'}}>bi cái</b> (trắng) hoặc <b style={{color:'var(--gold)'}}>mốc hướng</b> — app vẽ đường bi nảy qua các băng (góc tới = góc phản).</div>
      <svg ref={svgRef} className="mtable" viewBox="0 0 100 54" preserveAspectRatio="xMidYMid meet"
        style={{width:'100%',maxWidth:'none',touchAction:'none'}}
        onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
        onTouchStart={down} onTouchMove={move} onTouchEnd={up}>
        <defs><marker id="acAh" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="4.6" refY="2.6" orient="auto"><path d="M0,0 L5.2,2.6 L0,5.2 Z" fill="#ffd166"/></marker></defs>
        <TableFrame/>
        <line x1={A.x} y1={A.y} x2={B.x} y2={B.y} stroke="#ffffff" strokeOpacity=".3" strokeWidth=".6" strokeDasharray="2 2"/>
        <polyline points={path.pts.map(p=>p.x+','+p.y).join(' ')} fill="none" stroke="#ffd166" strokeWidth="1.3" strokeLinejoin="round" markerEnd="url(#acAh)"/>
        {path.pts.slice(1,path.made?path.pts.length:-1).map((p,i)=><circle key={'k'+i} cx={p.x} cy={p.y} r="1.5" fill="#fff" opacity=".85"/>)}
        <circle cx={B.x} cy={B.y} r="3" fill="none" stroke="#f4c95d" strokeWidth="1.1" strokeDasharray="2 1.4"/>
        <circle cx={A.x} cy={A.y} r="3.6" fill="#f3f1e8" stroke="rgba(0,0,0,.4)" strokeWidth=".6"/>
      </svg>
      <div className="statline" style={{justifyContent:'center'}}>
        <span>Số băng: <b>{path.bounces}</b></span>
        {path.made && <span style={{color:'var(--ok)'}}>● Vào lỗ!</span>}
        <button className="chip" onClick={()=>{setA({x:24,y:38});setB({x:62,y:18});}}>↺ Đặt lại</button>
      </div>
    </div>
  );
}

function GuidedStretch({onDone}){
  const cum=[]; let acc=0; STRETCHES.forEach(s=>{ acc+=s.s; cum.push(acc); });
  const total=acc;
  const [t,setT]=useState(0);
  const ref=useRef(null), lastIdx=useRef(0);
  useEffect(()=>{ ref.current=setInterval(()=>setT(x=>x+1),1000); return ()=>clearInterval(ref.current); },[]);
  const done=t>=total;
  let idx=cum.findIndex(c=>t<c); if(idx<0) idx=STRETCHES.length-1;
  const left=Math.max(0,cum[idx]-t);
  useEffect(()=>{
    if(done){ clearInterval(ref.current); if(lastIdx.current>=0){ lastIdx.current=-1; buzz([200,80,300]); beep(440,0.18,0.5);} return; }
    if(idx!==lastIdx.current){ if(lastIdx.current>=0&&t>0){ buzz(140); beep(620,0.1,0.4); } lastIdx.current=idx; }
  });
  if(done) return (
    <div className="card" style={{padding:18,textAlign:'center',marginTop:8}}>
      <div style={{fontSize:38}}>✅</div>
      <div style={{fontWeight:800,fontSize:16,margin:'6px 0'}}>Xong khởi động — sẵn sàng vào bàn!</div>
      <button className="btn ghost wide" onClick={onDone}>Đóng</button>
    </div>
  );
  const cur=STRETCHES[idx];
  return (
    <div className="card" style={{padding:18,textAlign:'center',marginTop:8}}>
      <div className="muted small">Động tác {idx+1}/{STRETCHES.length}</div>
      <div style={{fontWeight:900,fontSize:21,margin:'4px 0'}}>{cur.n}</div>
      <div className="muted" style={{fontSize:13,minHeight:34,lineHeight:1.4}}>{cur.h}</div>
      <div style={{fontSize:52,fontWeight:900,color:'var(--gold)',fontVariantNumeric:'tabular-nums',lineHeight:1}}>{left}</div>
      <button className="btn ghost wide" style={{marginTop:8}} onClick={onDone}>Dừng</button>
    </div>
  );
}
function WarQuote(){
  const [i,setI]=useState(()=>Math.floor((Date.now()/1000)%WAR_QUOTES.length));
  const next=()=>setI(p=>{ let n=p; while(n===p&&WAR_QUOTES.length>1) n=Math.floor(Math.random()*WAR_QUOTES.length); return n; });
  return (
    <div style={{marginTop:6}}>
      <div className="card cuecard" style={{minHeight:140}} onClick={next}>
        <div className="q">“</div>
        <div className="t" style={{fontSize:19}}>{WAR_QUOTES[i]}</div>
      </div>
      <button className="btn acc wide" style={{marginTop:10}} onClick={next}>🔀 Câu khác</button>
    </div>
  );
}
function platformIco(u){ if(/spotify/i.test(u)) return '🟢'; if(/youtu/i.test(u)) return '▶️'; return '🔗'; }
function platformName(u){ if(/spotify/i.test(u)) return 'Spotify'; if(/youtu/i.test(u)) return 'YouTube'; return 'Link nhạc'; }
function MusicLinks(){
  const [list,setList]=useState(()=>store.get('nc.music',[]));
  const [url,setUrl]=useState(''); const [label,setLabel]=useState('');
  const save=(l)=>{ setList(l); store.set('nc.music',l); };
  const add=()=>{ let u=url.trim(); if(!u) return; if(!/^https?:\/\//i.test(u)) u='https://'+u;
    save([{id:uid('mu'),url:u,label:label.trim()||platformName(u)},...list]); setUrl(''); setLabel(''); };
  const del=(id)=>save(list.filter(x=>x.id!==id));
  return (
    <div style={{marginTop:8}}>
      <div className="editrow"><input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Tên (vd: Máu chiến)" style={{flex:'0 0 36%'}}/>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="Dán link Spotify / YouTube"/></div>
      <button className="btn ghost wide" onClick={add} style={{marginBottom:10}}>＋ Thêm link</button>
      {list.length===0
        ? <div className="muted small">Chưa có link. Dán link playlist của bạn ở trên để mở nhanh.</div>
        : <div className="list">
            {list.map(m=>(
              <div key={m.id} className="musicRow">
                <span style={{fontSize:20}}>{platformIco(m.url)}</span>
                <a href={m.url} target="_blank" rel="noopener noreferrer" className="musicLink">{m.label||m.url}</a>
                <button onClick={()=>del(m.id)} className="xbtn">✕</button>
              </div>))}
          </div>}
    </div>
  );
}
/* ================= Reset (trấn an tức thì) ================= */
function ResetOverlay({close}){
  const line=useRef(RESET_LINES[Math.floor((Date.now()/1000)%RESET_LINES.length)]).current;
  const cyc=RESET_PHASES.reduce((s,p)=>s+p[1],0);
  const cycles=2, total=cyc*cycles;
  const [t,setT]=useState(0);
  const ref=useRef(null), lastPi=useRef(-1);
  useEffect(()=>{ try{ const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); }catch(e){}
    return ()=>{ try{ if(document.fullscreenElement&&document.exitFullscreen) document.exitFullscreen().catch(()=>{}); }catch(e){} }; },[]);
  useEffect(()=>{ ref.current=setInterval(()=>setT(x=>Math.round((x+0.1)*10)/10),100); return ()=>clearInterval(ref.current); },[]);
  const done=t>=total;
  const inCyc=t%cyc; let a=0, ph=RESET_PHASES[0], pi=0;
  for(let i=0;i<RESET_PHASES.length;i++){ if(inCyc<a+RESET_PHASES[i][1]){ ph=RESET_PHASES[i]; pi=i; break; } a+=RESET_PHASES[i][1]; }
  useEffect(()=>{ if(done){ clearInterval(ref.current); return; } if(pi!==lastPi.current){ lastPi.current=pi; buzz(50); } });
  const breathsLeft=Math.max(1,cycles-Math.floor(t/cyc));
  return (
    <div className="scOverlay" style={{background:'var(--bg)',gap:22}} onClick={(e)=>{ if(done) close(); }}>
      <button className="scClose" onClick={(e)=>{e.stopPropagation();close();}} aria-label="Đóng">✕</button>
      <div className="resetLine">{line}</div>
      <div className="orb" style={{width:'min(58vw,220px)',transform:`scale(${done?1.05:ph[2]})`,transitionDuration:done?'.6s':ph[1]+'s'}}>
        <div><div className="ph">{done?'Sẵn sàng':ph[0]}</div></div>
      </div>
      {done
        ? <button className="btn acc" style={{maxWidth:260}} onClick={close}>Tôi ổn rồi — vào bàn</button>
        : <div className="scHint">Theo nhịp thở · còn {breathsLeft} hơi</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
